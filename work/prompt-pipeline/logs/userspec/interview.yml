# Interview Plan for Feature Planning
# Prompt Pipeline — n8n workflow для пошаговой разработки через copy-paste в LLM

interview_metadata:
  started: "2026-03-25 12:00:00"
  last_updated: "2026-03-25 12:30:00"
  status: "in_progress"
  can_resume: true
  current_question_num: 8
  feature_size: "M"

conversation_history:
  - question_num: 1
    timestamp: "2026-03-25 12:00:00"
    topic: "feature_description"
    agent_question: |
      Опиши, что хочешь сделать.
    user_answer: |
      Хочу создать приложение, которое реализует весь путь работы по методологии,
      но без CLI агента, а через любую LLM. Веб-интерфейс с цепочкой промтов,
      которые переносишь в LLM и получаешь код для копирования.
      Это на случай когда лимиты заканчиваются, а проект делать надо.
    summary: "Prompt Pipeline — замена CLI-агента через copy-paste в LLM"

  - question_num: 2
    timestamp: "2026-03-25 12:05:00"
    topic: "constraints"
    agent_question: |
      Стек, стратегия контекста, формат?
    user_answer: |
      Ограничить систему маленьким кругом простых форматов с вариациями простых стеков.
      Не больше 5-8 файлов в результате, если больше — промт предлагает собрать MVP,
      остальное в бэклог. ~10 шаблонов.
    summary: "5-8 файлов лимит, ~10 шаблонов стеков, MVP-first подход"

  - question_num: 3
    timestamp: "2026-03-25 12:10:00"
    topic: "templates"
    agent_question: |
      Какие стеки поддержать?
    user_answer: |
      Лендинги, вебапы, боты, набор из 10 вариантов. Обязательно n8n шаблоны 3-5 штук.
    summary: "~13 шаблонов: лендинги, вебапы, боты, API, CLI, n8n workflows"

  - question_num: 4
    timestamp: "2026-03-25 12:15:00"
    topic: "pivot_to_n8n"
    agent_question: |
      n8n может быть самой платформой для Prompt Pipeline?
    user_answer: |
      Да, на базе n8n можно реализовать такого костыльного CLI бота.
    summary: "Пивот: сам Prompt Pipeline = n8n workflow"

  - question_num: 5
    timestamp: "2026-03-25 12:18:00"
    topic: "llm_providers"
    agent_question: |
      Какие LLM доступны?
    user_answer: |
      ChatGPT, DeepSeek, Qwen. Только бесплатные решения через сайт, API не вариант.
    summary: "Copy-paste через chatgpt.com/deepseek/qwen, без API"

  - question_num: 6
    timestamp: "2026-03-25 12:20:00"
    topic: "success_criteria"
    agent_question: |
      Критерии успеха — от идеи до рабочего лендинга за 40 минут через copy-paste?
    user_answer: |
      Да.
    summary: "Критерий: от идеи до рабочего проекта быстро через copy-paste"

  - question_num: 7
    timestamp: "2026-03-25 12:22:00"
    topic: "testing_strategy"
    agent_question: |
      Unit-тесты только на парсер ответов LLM, остальное без тестов?
    user_answer: |
      Да.
    summary: "Unit-тесты только на парсер"

  - question_num: 8
    timestamp: "2026-03-25 12:25:00"
    topic: "infrastructure"
    agent_question: |
      n8n установлен?
    user_answer: |
      На VPS лежит всё.
    summary: "n8n уже на VPS"

