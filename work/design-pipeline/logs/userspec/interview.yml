# ============================================================================
# Phase 2: User Experience & Scenarios
# ============================================================================
phase2_user_experience:

  user_stories:
    score: 85
    status: "complete"
    value: |
      А: /design-system-init → интервью → tokens.json + компоненты → проверка в браузере
      Б: /design-generate → описание → HTML+SVG → скрин → итерация
      В: MVP-интеграция → do-task с UI → design-review → 2-3 рекомендации
      Г: Ретроспектива → фидбек → уроки → промоушен → промт для следующей сессии
    gaps: ""
    required: true

  acceptance_criteria:
    score: 85
    status: "complete"
    value: |
      1. /design-system-init создаёт tokens.json с цветами, шрифтами, spacing
      2. /design-system-init создаёт минимум 3 компонента (button, card, input)
      3. Каждый компонент открывается в браузере автономно
      4. /design-generate создаёт pages/{name}.html и .svg
      5. HTML использует токены из DS (нет hardcoded)
      6. Contrast ratio ≥ 4.5:1
      7. Нет DS → отказ с предложением /design-system-init
      8. Не-веб проект → отказ с объяснением
      9. Design-review даёт конкретные рекомендации
      10. Ретроспектива после 3+ итераций → lessons-learned.md
      11. Повторяющийся урок (3+) → промоушен в design-principles.md
      12. Промт для следующей сессии при закрытии текущей
    gaps: ""
    required: true

  edge_cases:
    score: 85
    status: "complete"
    value: |
      - Нет DS → отказ, предложить /design-system-init
      - Не-веб → отказ (MVP), post-MVP — альтернатива
      - Фидбек противоречит принципам → мягко предложить альтернативу
      - Нарушение логики (тёмная тема без dark-токенов) → спросить пользователя
      - Компонент не в DS → по сложности: простой — создать, сложный — декомпозиция
      - Большая задача (длинная страница) → декомпозиция на композиции, разные сессии
    gaps: ""
    required: true

  error_scenarios:
    score: 85
    status: "complete"
    value: |
      - Нет DS → строгий отказ + ссылка на init
      - Не-веб → отказ + объяснение (MVP)
      - Противоречивый фидбек → мягкая рекомендация
      - Кривой SVG → запросить скрин, итерировать
      - Нарушение логики → спросить пользователя
      - Сложный компонент → декомпозиция + отдельные сессии
      - Токены заканчиваются → остановиться, сгенерировать промт для продолжения
    gaps: ""
    required: true

  verification_strategy:
    score: 85
    status: "complete"
    value: |
      - Визуальная: пользователь открывает HTML, оценивает, присылает скрины
      - Промежуточные скрины с комментариями
      - Автоматическая: токены, нет hardcoded, contrast ratio
      - Красоту оценивает только человек
    gaps: ""
    required: true

  ui_ux_requirements:
    score: 0
    status: "pending"
    value: ""
    gaps: ""
    required: false

  risks:
    score: 85
    status: "complete"
    value: |
      1. Качество без рендеринга → промежуточные скрины
      2. Токены → экономия, средний режим в MVP
      3. Вкусовщина → референсы, ретроспектива, профиль вкуса
      4. Не-веб → отказ в MVP
    gaps: ""
    required: true

  technical_decisions:
